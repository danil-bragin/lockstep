\* TLC model-check config for Lockstep Phase-4 Consensus.tla
\* Small finite instance: 3 servers, 2 command values, bounded terms / log length / messages.

SPECIFICATION Spec

CONSTANTS
    Server    = {s1, s2, s3}
    Value     = {v1, v2}
    Nil       = Nil
    Follower  = Follower
    Candidate = Candidate
    Leader    = Leader
    MaxTerm   = 3
    MaxLogLen = 3
    MaxMsgs   = 7
    TeethCommitOnEnqueue = FALSE

\* Bound the search.  Term growth is gated in Timeout, log growth in ClientRequest; the
\* constraint caps terms, log lengths, and the in-flight message set so the reachable state
\* space is finite and fully explorable (MaxMsgs bounds the otherwise-monotone message set).
CONSTRAINT StateConstraint

\* Symmetry over interchangeable model values (server ids and client values).
SYMMETRY Symmetry

INVARIANT ElectionSafety
INVARIANT LogMatching
INVARIANT StateMachineSafety
INVARIANT DurableBounded
INVARIANT CommitIsDurable

\* LeaderAppendOnly is an action invariant; checked as a temporal property.
PROPERTY LeaderAppendOnlyProp
