\* TLC config for Snapshot.tla (C4.3 log compaction / snapshot install) — small finite instance.
\* 2 servers, 2 keys, 2 values; canonical committed log capped at length 3. This exercises:
\*   - multi-entry replication (AppendCommitted), Apply, TakeSnapshot (prefix discard),
\*   - a lagging follower caught up by InstallSnapshot,
\* while staying exhaustively checkable.

CONSTANTS
    Server = {s1, s2}
    Key    = {k1, k2}
    Value  = {v1, v2}
    Nil    = Nil
    MaxLogLen = 3

SPECIFICATION Spec

SYMMETRY Symmetry

\* All servers fully caught up / fully compacted is a legitimate terminal state (the committed log
\* stopped growing at the cap), not a liveness hole. Disable the deadlock check.
CHECK_DEADLOCK FALSE

CONSTRAINT StateConstraint

INVARIANT TypeOK
INVARIANT CompactionPreservesState
INVARIANT SnapshotPrefixConsistent
INVARIANT RecoveredEqualsFull
INVARIANT AppliedStateSafety
