\* TLC config for XShardCommit.tla (S9.3) — small finite, exhaustively checkable.
\* 2 shards, 3 txns: a,b are CROSS-SHARD (touch both sh1+sh2); c is single-shard
\* (sh2 only). epochs bounded to 2. This exercises:
\*   - a cross-shard txn replicated into BOTH shard logs, sealed only when present
\*     on both (the all-or-nothing seal gate + the laggard-epoch rule),
\*   - the dedup to ONE global position (a,b each appear once despite 2 log entries),
\*   - a single-shard txn alongside cross-shard ones in the same batch,
\*   - the atomic apply (all shards or none), bounded over 2 epochs.

CONSTANTS
    Shard = {sh1, sh2}
    Txn   = {a, b, c}
    MaxEpoch = 2
    sh1 = sh1   sh2 = sh2
    a = a   b = b   c = c

\* ShardsOf / ShardRank are functions -> mapped to operators in the .tla (function
\* literals like (a :> {sh1,sh2}) are not legal in a .cfg). a,b cross-shard; c on
\* sh2 only. ShardRank injective: sh1 < sh2.
CONSTANT ShardsOf  <- ShardsOfDef
CONSTANT ShardRank <- ShardRankDef

SPECIFICATION Spec

\* All txns committed everywhere + all closed epochs sealed + all sealed txns
\* applied is the legitimate terminal state of a drained batch, not a stall.
\* WF_vars(Next) keeps the spec progress-fair.
CHECK_DEADLOCK FALSE

CONSTRAINT StateConstraint

INVARIANT AtomicAllOrNone
INVARIANT OneGlobalPosition
INVARIANT ExactlyOnceGlobal
INVARIANT AppliedImpliesGlobal
INVARIANT GlobalOrderDeterministic
INVARIANT PerShardSubmissionPreserved
INVARIANT EpochMonotone
