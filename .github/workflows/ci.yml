# =============================================================================
# Lockstep CI -- gate-as-code: the FULL universal merge gate (master-plan §8).
#
# This workflow IS the gate, and it MIRRORS scripts/gate.sh / scripts/gate-linux.sh
# (the local source of truth) so CI green == local gate green. Ubuntu + LLVM/clang
# provides what the macOS / Apple-clang dev host cannot: ASan, TSan, UBSan, MSan,
# clang-tidy, scan-build. Two stages need the project's Linux dev IMAGE rather than
# bare apt clang, and they say so below:
#   * MSan         -- real MSan needs an MSan-INSTRUMENTED libc++ (else stdlib
#                     false-positives). The Docker image builds it once
#                     (tools/docker/Dockerfile -> $LOCKSTEP_MSAN_LIBCXX); the msan
#                     job runs inside that image. The heavy libc++ layer is cached
#                     via the GitHub Actions cache so it is built ~once, not per run.
#
# REQUIRED STATUS CHECKS -- the gate cannot be bypassed.
#   Configure gate-summary (the single fan-in job) as a REQUIRED status check on
#   the protected default branch (Settings -> Branches -> Branch protection ->
#   "Require status checks to pass before merging"). It fails if ANY upstream stage
#   failed or was skipped, so no PR merges unless the whole §8 battery is green.
#   Per cardinal rule 2, "the verification battery is the gate"; per spec C0.5 it is
#   "encoded directly in CI so it cannot be bypassed."
#
# ORDERED STAGES (master-plan §8), expressed via `needs:` dependencies:
#   compile (debug+release)
#     -> lint (forbidden-call) + clang-tidy + scan-build (static analysis)
#       -> sanitizers: ASan, TSan, UBSan (plain clang)  +  MSan (instrumented libc++)
#         -> deterministic simulation battery   [covered by ctest; explicit hook]
#           -> conforms-to-formal-spec           [REAL: TLC over every spec]
#             -> applicable linearizability checks [covered by ctest; explicit hook]
#               -> mutation score not regressed   [mirrors gate.sh policy]
#
# Phase-6 reality vs the Phase-0 placeholders:
#   * conforms-to-formal-spec is now REAL: it model-checks all 6 specs in TLC and
#     asserts the Membership2 "teeth" cfg (2-server jump) VIOLATES QuorumOverlap.
#   * the deterministic-simulation battery and linearizability checks run AS PART OF
#     ctest (seed-sweep, cross-check, conformance, and end-to-end fault-storm tests
#     execute in the compile + sanitizer stages above), so the dedicated stages here
#     stay explicit hooks that document where that coverage lives rather than
#     re-running it. They go real-standalone if/when a separate Jepsen-style checker
#     is added.
#
# CMake presets used (defined in CMakePresets.json): debug release asan tsan ubsan msan
# =============================================================================
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin the LLVM/clang toolchain everywhere so the sanitizer instrumentation and
  # the static-analysis tools all come from one consistent toolchain.
  CC: clang
  CXX: clang++

jobs:
  # ===========================================================================
  # STAGE 1 -- COMPILE (debug + release build matrix). ctest here also exercises
  # the deterministic-simulation / cross-check / conformance / end-to-end tests.
  # ===========================================================================
  compile:
    name: compile (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [debug, release]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (llvm/clang, cmake, ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tools clang-tidy cmake ninja-build
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test (ctest)
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  # ===========================================================================
  # STAGE 2 -- LINT + STATIC ANALYSIS
  #   (a) forbidden-call lint   (b) clang-tidy   (c) clang static analyzer
  # ===========================================================================
  lint:
    name: lint (forbidden-call)
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Forbidden-call lint (cardinal rule 1 -- whole tree except providers/)
        run: python3 tools/lint/forbidden_calls.py .

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tools clang-tidy cmake ninja-build
      - name: Configure (debug -> emits compile_commands.json)
        run: cmake --preset debug
      - name: Run clang-tidy over tracked C++ (providers/ + lint fixtures exempt)
        run: |
          # Analyze only TRANSLATION UNITS (.cpp/.cc) — they have a compile_commands.json
          # entry, so the include paths resolve. Headers are NOT analyzed standalone
          # (they have no compile command -> spurious "file not found"); their diagnostics
          # surface through the .cpp that includes them, gated by HeaderFilterRegex.
          # Exempt providers/ (cardinal rule 1), tools/lint/fixtures/ (deliberately
          # dirty lint fixtures), and bench/compare/ (the competitive harness — built
          # standalone outside the CMake project, so it has no compile_commands entry
          # and its includes don't resolve here). Same exemptions the forbidden lint uses.
          git ls-files '*.cpp' '*.cc' \
            | grep -vE '^(providers|tools/lint/fixtures|bench/compare)/' \
            | xargs -r clang-tidy -p build/debug

  scan-build:
    name: scan-build (clang static analyzer)
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tools clang-tidy cmake ninja-build
      - name: Configure under scan-build
        run: scan-build --use-cc=clang --use-c++=clang++ cmake --preset debug
      - name: Build under scan-build (--status-bugs fails on any finding)
        # --use-cc/--use-c++=clang so the analyzer's underlying COMPILE uses clang (as the configure
        # step does), not the system g++ default. g++ under -Wpedantic -Werror rejects __int128
        # ("ISO C++ does not support '__int128'"), which the project uses widely (SeededRandom, the
        # 128-bit SQL types); clang accepts it. Without this the scan-build build fails to compile.
        run: scan-build --use-cc=clang --use-c++=clang++ --status-bugs cmake --build --preset debug

  # ===========================================================================
  # STAGE 3a -- SANITIZERS on plain clang: ASan / TSan / UBSan.
  #   Each: configure -> build -> ctest under the sanitizer preset.
  # ===========================================================================
  sanitizers:
    name: sanitizer (${{ matrix.preset }})
    runs-on: ubuntu-latest
    needs: [lint, clang-tidy, scan-build]
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, tsan, ubsan]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + sanitizer runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tools cmake ninja-build
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test (ctest under sanitizer)
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  # ===========================================================================
  # STAGE 3b -- MSan, inside the Linux dev IMAGE (MSan-instrumented libc++).
  #   Plain apt clang would false-positive in stdlib internals; the image builds
  #   libc++/libc++abi/libunwind with -fsanitize=memory once. The heavy build is
  #   cached as a Docker layer via the GH Actions cache, so it is paid ~once.
  #   This is exactly the MSan stage scripts/gate-linux.sh runs.
  # ===========================================================================
  msan:
    name: sanitizer (msan, instrumented libc++)
    runs-on: ubuntu-latest
    needs: [lint, clang-tidy, scan-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build the Linux dev image (instrumented libc++, layer-cached)
        uses: docker/build-push-action@v6
        with:
          context: tools/docker
          file: tools/docker/Dockerfile
          tags: lockstep-dev:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: ctest under REAL MSan (instrumented libc++ from $LOCKSTEP_MSAN_LIBCXX)
        run: |
          docker run --rm -v "$PWD:/work" -w /work --memory=8g --cpus=2 \
            lockstep-dev:latest bash -lc '
              set -euo pipefail
              rm -rf build/msan
              cmake --preset msan
              cmake --build --preset msan
              # MSan (origin-tracking) is ~5x slower and runs on 2 cores. Shrink the heavy
              # seed-sweep / fault-storm tests to a few seeds — MSan detects use-of-uninitialized
              # on the code PATHS, not via statistical seed coverage, so a handful of seeds is
              # enough here; the full sweeps run under plain + ASan/TSan/UBSan. Skip the
              # morsel-parallel determinism gate (a threading gate that TSan owns; under MSan it
              # is pathologically slow on 2 cores and adds no uninit coverage).
              export CONSENSUS_A_SEEDS=8 CONSENSUS_XCHECK_SEEDS=8 LOCKSTEP_E2E_SEEDS=8 \
                     LOCKSTEP_XSHARD_SEEDS=4 LOCKSTEP_WISCKEY_SEEDS=16
              ctest --preset msan --output-on-failure -E "sql_parallel_agg_test"'

  # ===========================================================================
  # STAGE 4 -- DETERMINISTIC SIMULATION BATTERY.
  #   The sim harness, seed-sweep, fault-storm and end-to-end tests run as part of
  #   ctest in STAGE 1/3 above (they are registered ctest targets). This explicit
  #   hook documents that coverage; it goes standalone only if the battery is ever
  #   split out of ctest.
  # ===========================================================================
  sim-battery:
    name: deterministic simulation battery
    runs-on: ubuntu-latest
    needs: [sanitizers, msan]
    steps:
      - uses: actions/checkout@v4
      - name: Sim battery (runs within ctest; see compile + sanitizer stages)
        run: "echo 'sim battery executes inside ctest (seed-sweep / fault-storm / e2e targets)'"

  # ===========================================================================
  # STAGE 5 -- CONFORMS-TO-FORMAL-SPEC (REAL: model-check every spec in TLC).
  #   Bounded runner (scripts/tlc.sh: capped heap, /tmp metadir, bounded workers).
  #   Positive specs must hold; the Membership2 "teeth" cfg (2-server jump) MUST
  #   violate QuorumOverlap -- a negative control proving the checker has teeth.
  # ===========================================================================
  spec-conformance:
    name: conforms-to-formal-spec (TLC)
    runs-on: ubuntu-latest
    needs: sim-battery
    env:
      TLC_WORKERS: "2"
      TLC_XMX: "5g"
    steps:
      - uses: actions/checkout@v4
      - name: Install JRE
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre-headless
      - name: Model-check every spec (invariants must hold)
        run: |
          set -e
          for s in CommitOrdering Consensus Membership Sequencer Snapshot XShardCommit; do
            echo "==================== TLC: $s ===================="
            bash scripts/tlc.sh -config "specs/$s.cfg" "specs/$s.tla"
          done
          # Consensus1.cfg is a SECOND config for Consensus.tla (the N=1 single-server
          # case -- the N=1 self-commit fix). Its invariants must hold too.
          echo "==================== TLC: Consensus (N=1, Consensus1.cfg) ===================="
          bash scripts/tlc.sh -config specs/Consensus1.cfg specs/Consensus.tla
      - name: Teeth -- Membership2 (2-server jump) MUST violate QuorumOverlap
        run: |
          if bash scripts/tlc.sh -config specs/Membership2.cfg specs/Membership.tla; then
            echo "TEETH FAIL: Membership2 (2-server jump) should violate QuorumOverlap, but TLC reported no error."
            exit 1
          fi
          echo "TEETH OK: Membership2 violated QuorumOverlap as expected (negative control holds)."

  # ===========================================================================
  # STAGE 6 -- APPLICABLE LINEARIZABILITY CHECKS.
  #   The strict-serializable oracle + the D5-level checkers + the cross-impl
  #   linearization checks run as ctest targets (txn / consensus / end-to-end
  #   conformance tests). This explicit hook documents that coverage.
  # ===========================================================================
  linearizability:
    name: linearizability checks
    runs-on: ubuntu-latest
    needs: spec-conformance
    steps:
      - uses: actions/checkout@v4
      - name: Linearizability (runs within ctest; oracle + D5 checkers + cross-check)
        run: "echo 'linearizability / strict-serializable checks execute inside ctest'"

  # ===========================================================================
  # STAGE 7 -- MUTATION SCORE NOT REGRESSED (adequacy meta-gate, §6.7).
  #   Mirrors scripts/gate.sh EXACTLY: invoke the runner with NO --threshold, so it
  #   uses its default policy (report survivors + fail on regression vs the recorded
  #   baseline) rather than a fixed percentage. A fixed 100% threshold is wrong here:
  #   there is a PROVEN-EQUIVALENT mutant (Scheduler.hpp insertion-sort guard) that
  #   no test can kill, so 100% is unreachable and would red the gate forever.
  # ===========================================================================
  mutation:
    name: mutation score not regressed
    runs-on: ubuntu-latest
    needs: linearizability
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (mutation rebuilds the suite in a shadow tree)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tools cmake ninja-build
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Mutation runner (same invocation as scripts/gate.sh)
        run: python3 tools/mutation/run_mutation.py

  # ===========================================================================
  # GATE SUMMARY -- single fan-in check. Make THIS the required status check, so
  # the whole ordered battery must be green before merge. Fails if ANY upstream
  # job failed or was skipped.
  # ===========================================================================
  gate-summary:
    name: gate-summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - compile
      - lint
      - clang-tidy
      - scan-build
      - sanitizers
      - msan
      - sim-battery
      - spec-conformance
      - linearizability
      - mutation
    steps:
      - name: Verify all gate stages succeeded
        run: |
          echo "compile=${{ needs.compile.result }}"
          echo "lint=${{ needs.lint.result }}"
          echo "clang-tidy=${{ needs.clang-tidy.result }}"
          echo "scan-build=${{ needs.scan-build.result }}"
          echo "sanitizers=${{ needs.sanitizers.result }}"
          echo "msan=${{ needs.msan.result }}"
          echo "sim-battery=${{ needs.sim-battery.result }}"
          echo "spec-conformance=${{ needs.spec-conformance.result }}"
          echo "linearizability=${{ needs.linearizability.result }}"
          echo "mutation=${{ needs.mutation.result }}"
          if [ "${{ needs.compile.result }}" != "success" ] \
            || [ "${{ needs.lint.result }}" != "success" ] \
            || [ "${{ needs.clang-tidy.result }}" != "success" ] \
            || [ "${{ needs.scan-build.result }}" != "success" ] \
            || [ "${{ needs.sanitizers.result }}" != "success" ] \
            || [ "${{ needs.msan.result }}" != "success" ] \
            || [ "${{ needs.sim-battery.result }}" != "success" ] \
            || [ "${{ needs.spec-conformance.result }}" != "success" ] \
            || [ "${{ needs.linearizability.result }}" != "success" ] \
            || [ "${{ needs.mutation.result }}" != "success" ]; then
            echo "GATE: FAIL -- one or more required stages did not succeed."
            exit 1
          fi
          echo "GATE: PASS -- full universal merge gate green."
