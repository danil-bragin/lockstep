\* TLC model-check config for Lockstep Phase-4 Consensus.tla — 1-SERVER instance.
\*
\* N=1 SELF-COMMIT CONFIRMATION. The spec models AdvanceCommitIndex(s) as a standalone,
\* always-enabled action (commitIndex advances the instant a Quorum — which for a single
\* server is the lone leader itself — stores a current-term entry). This config confirms
\* the four safety invariants STILL HOLD when the cluster is a single server: a 1-node
\* leader elects itself (Quorum = 1) and self-commits its own appended entries, with no
\* peer ever involved. It is the spec-side proof that the C++ N=1 self-commit fix is safe.
\*
\* Single model value s1 ⇒ Quorum = {s1}; ClientRequest then AdvanceCommitIndex on the
\* lone leader advances commitIndex to Len(log) with no AppendEntries hop. Same bounds as
\* the 3-server config; the reachable space is tiny (no peers, no message exchange).

SPECIFICATION Spec

CONSTANTS
    Server    = {s1}
    Value     = {v1, v2}
    Nil       = Nil
    Follower  = Follower
    Candidate = Candidate
    Leader    = Leader
    MaxTerm   = 3
    MaxLogLen = 3
    MaxMsgs   = 7

CONSTRAINT StateConstraint

\* A single-node cluster legitimately QUIESCES: once the lone leader has self-committed
\* its log up to the bounds (MaxTerm / MaxLogLen) there is no peer traffic to generate a
\* successor state, so the reachable graph has terminal states. That is expected (it is a
\* finite, peerless run), not a bug — deadlock-freedom is not a property we assert here.
\* We check the SAFETY invariants below hold on every reachable state; disable TLC's
\* default deadlock check so a quiesced terminal state is not reported as an error.
CHECK_DEADLOCK FALSE

\* Symmetry over interchangeable model values (a singleton Server permutes trivially).
SYMMETRY Symmetry

INVARIANT ElectionSafety
INVARIANT LogMatching
INVARIANT StateMachineSafety

\* LeaderAppendOnly is an action invariant; checked as a temporal property.
PROPERTY LeaderAppendOnlyProp
