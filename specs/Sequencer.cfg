\* TLC config for Sequencer.tla (C4.4) — small finite, exhaustively checkable instance.
\* 2 shards, 4 txns (2 owned by each shard), epochs bounded to 2. This is enough to exercise:
\*   - multiple shards committing into the SAME epoch (a non-trivial merge batch),
\*   - per-shard order within a shard (2 txns per shard => an index order to preserve),
\*   - commits landing in DIFFERENT epochs (epoch-ordered batches in the global log),
\*   - sealing epochs strictly in order.

CONSTANTS
    Shard = {sh1, sh2}
    Txn   = {a, b, c, d}
    MaxEpoch = 2
    sh1 = sh1   sh2 = sh2
    a = a   b = b   c = c   d = d

\* ShardOf / ShardRank are functions -> mapped to operators in the .tla (function literals like
\* (a :> sh1) are not legal in a .cfg). a,b owned by sh1; c,d owned by sh2. ShardRank: sh1<sh2.
CONSTANT ShardOf   <- ShardOfDef
CONSTANT ShardRank <- ShardRankDef

SPECIFICATION Spec

\* All txns committed + all closed epochs sealed is a legitimate terminal state (the batch drained,
\* the open epoch can't advance past MaxEpoch). Disable deadlock detection so TLC treats batch
\* completion as success, not a stall. WF_vars(Next) keeps the spec progress-fair.
CHECK_DEADLOCK FALSE

\* Bound the search: cap epoch, sealed, and per-shard log length so the reachable space is finite.
CONSTRAINT StateConstraint

INVARIANT GlobalOrderDeterministic
INVARIANT PerShardOrderPreserved
INVARIANT EpochMonotone
INVARIANT ExactlyOnceGlobal
INVARIANT NoLossSealed
