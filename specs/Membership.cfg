\* TLC model-check config for Lockstep Phase-4 C4.2 Membership.tla — SINGLE-SERVER change.
\* Small finite instance: base cluster {s1,s2,s3}, a fourth server (s4) addable/removable, a
\* single-server delta (MaxChangeDelta = 1), bounded terms, bounded config-chain length.

SPECIFICATION Spec

CONSTANTS
    Server        = {s1, s2, s3, s4}
    Nil           = Nil
    Follower      = Follower
    Candidate     = Candidate
    Leader        = Leader
    MaxTerm       = 3
    MaxConfigs    = 3
    MaxChangeDelta = 1
    InitConfig    = {s1, s2, s3}

\* Bound the search: cap terms (election rounds) and config-chain length.
CONSTRAINT StateConstraint

\* Single-server membership changes reach a deterministic TERMINAL state (the config chain
\* stops growing at MaxConfigs and no further single-server delta is enabled) — the intended
\* end of the run, not a liveness hole. Disable the deadlock check, as the other terminating
\* specs (CommitOrdering / Snapshot / Sequencer / XShardCommit) do. The teeth config
\* (Membership2.cfg) still errors EARLIER on the QuorumOverlap invariant, so the negative
\* control is unaffected.
CHECK_DEADLOCK FALSE

\* NOTE: No SYMMETRY declared. InitConfig = {s1,s2,s3} singles out s4 (the add/remove
\* candidate), so server ids are NOT fully interchangeable — Permutations(Server) would be
\* UNSOUND here (it would treat s4 as equivalent to s1). The instance is small enough to
\* explore exhaustively without symmetry reduction.

\* The C4.2 deliverable invariants.
INVARIANT TypeOK
INVARIANT ElectionSafety
INVARIANT QuorumOverlap
INVARIANT ConfigChangeSafety
