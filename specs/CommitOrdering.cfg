\* TLC config for CommitOrdering.tla — small finite, exhaustively checkable instance.
\* 3 txns, 2 keys. One txn (t2) has a value-dependent footprint that can trigger an OLLP
\* re-sequence (its ACTUAL read set expands to include y when x is non-Empty at execution).

CONSTANTS
    Txn   = {t1, t2, t3}
    Key   = {x, y}
    Empty = Empty
    t1 = t1   t2 = t2   t3 = t3
    x  = x    y  = y
    MaxRetry = 2

\* Footprint functions live in the .tla (function literals aren't legal in a .cfg).
CONSTANT RSet    <- RSetDef
CONSTANT WSet    <- WSetDef
CONSTANT Trigger <- TriggerDef
CONSTANT Extra   <- ExtraDef

SPECIFICATION Spec

\* All txns committed/aborted is a legitimate terminal state for a one-shot batch (every txn
\* reached a deterministic terminal outcome) — not a liveness hole. Disable the deadlock check so
\* TLC treats batch completion as success rather than a stuck state.
CHECK_DEADLOCK FALSE

\* Bound the search: cap seqLog length and per-txn retries so re-sequencing stays finite.
CONSTRAINT StateConstraint

INVARIANT SerializedBySeqLog
INVARIANT ReadsMatchSerialPrefix
INVARIANT StoreReflectsHistory
INVARIANT OLLPSound
INVARIANT ExactlyOnce
INVARIANT D5Snapshot
INVARIANT D5BoundedStale
INVARIANT D5ReadYourWrites
