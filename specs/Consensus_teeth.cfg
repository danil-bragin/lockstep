\* TLC TEETH config for Lockstep Consensus.tla — S9.2 DURABILITY BUG REPRODUCTION.
\*
\* This config sets TeethCommitOnEnqueue = TRUE, degrading the commit rule to the
\* PRE-FIX behavior: an entry counts toward a commit quorum the instant it is ENQUEUED
\* (appended to log), BEFORE its fsync completes (durable[i] >= idx is replaced by
\* Len(log[i]) >= idx). This is exactly the bug the S9.2 code fix closed.
\*
\* EXPECTED RESULT: TLC MUST report an INVARIANT CommitIsDurable VIOLATION. A single-
\* server leader appends an entry and AdvanceCommitIndex fires immediately (Len(log)
\* satisfies the quorum) while durable[s1] is still 0 — so the committed index has NO
\* durable quorum backing it, and an abrupt crash would lose a committed entry. The
\* violation is the TEETH: it proves the spec (with the fix, TeethCommitOnEnqueue=FALSE)
\* genuinely REQUIRES commit-follows-fsync, rather than permitting it incidentally.
\*
\* A single server makes the bug unambiguous (the lone-leader N=1 self-commit is the
\* exact path the io_uring fsync exposed). Run:
\*   scripts/tlc.sh -config specs/Consensus_teeth.cfg specs/Consensus.tla
\* and confirm TLC prints "Invariant CommitIsDurable is violated."

SPECIFICATION Spec

CONSTANTS
    Server    = {s1}
    Value     = {v1, v2}
    Nil       = Nil
    Follower  = Follower
    Candidate = Candidate
    Leader    = Leader
    MaxTerm   = 3
    MaxLogLen = 3
    MaxMsgs   = 7
    TeethCommitOnEnqueue = TRUE

CONSTRAINT StateConstraint

CHECK_DEADLOCK FALSE

SYMMETRY Symmetry

\* The teeth invariant. Under TeethCommitOnEnqueue=TRUE this MUST be violated (commit
\* outruns durability). The other safety invariants are still listed so a run that
\* somehow left them intact is still visibly a CommitIsDurable failure.
INVARIANT ElectionSafety
INVARIANT LogMatching
INVARIANT StateMachineSafety
INVARIANT DurableBounded
INVARIANT CommitIsDurable

PROPERTY LeaderAppendOnlyProp
